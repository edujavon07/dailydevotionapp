name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Strict Requirements
        # This is the magic fix! It forces the compiler to see flet-audio
        run: |
          rm -f requirements.txt
          echo "flet" > requirements.txt
          echo "flet-audio" >> requirements.txt
          echo "requests" >> requirements.txt
          cat requirements.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build the APK
        run: |
          flet build apk --project devotional --org com.edu.devotional

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Devotional-App
          path: build/apk/**/*.apk
          retention-days: 3
